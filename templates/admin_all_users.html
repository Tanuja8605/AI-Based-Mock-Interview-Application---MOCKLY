{% extends 'base_without_navbar.html' %}

{% block body %}

<style>
.title{
    text-align:center;
    margin-bottom:20px;
    font-weight:bold;
}
</style>

<div class="container">

<h2 class="title">All Registered Users</h2>

<table class="table table-bordered table-striped">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
</tr>
</thead>

<tbody>

{% for user in users %}

<tr>
<td>{{ user.id }}</td>
<td>{{ user.f_name }}</td>
<td>{{ user.email }}</td>

</tr>

{% endfor %}

</tbody>

</table>

<button onclick="printReport()" class="btn btn-primary">
🖨️ Download / Print Report
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
function printReport() {
    window.print();
}
</script>

{% endblock %}
