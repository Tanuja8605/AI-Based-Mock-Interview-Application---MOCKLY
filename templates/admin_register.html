{% extends 'base_without_navbar.html' %} {% block title %} Register {% endblock
title %} {% block body %}

<div class="card register-card shadow p-4 position-relative">
  <!-- ❌ Close / Remove Button -->
  

  <h3 class="text-center fw-bold mb-3">Create Account</h3>
  

  <form
    id="registerForm"
    action="{{ url_for('admin_register') }}"
    method="post"
  >
    

    <!-- Full Name -->
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input
        name="f_name"
        type="text"
        class="form-control"
        placeholder="Enter your name"
        required
      />
    </div>

    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input
        name="email"
        type="email"
        class="form-control"
        placeholder="Enter email"
        required
      />
    </div>

    <!-- Password -->
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input
        name="password"
        type="password"
        class="form-control"
        placeholder="Create password"
        required
      />
    </div>

    <!-- Confirm Password -->
    <div class="mb-3">
      <label class="form-label">Confirm Password</label>
      <input
        name="c_password"
        type="password"
        class="form-control"
        placeholder="Confirm password"
        required
      />
    </div>

    <!-- Register Button -->
    <button type="submit" class="btn btn-success w-100 py-2">Register</button>

    
  </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% endblock body %}
